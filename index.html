<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Perso</title>
    <style>
        /* BASE & THEME STARK */
        body {
            background-color: #0a0e17;
            font-family: 'Courier New', Courier, monospace;
            color: #00f0ff;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /*=========================================
          MESSAGE D'ACCUEIL F.R.I.D.A.Y. (AU MILIEU)
          =========================================*/
        .welcome-container {
            display: flex;
            align-items: center;
            gap: 30px;
            text-align: left;
            z-index: 1;
            max-width: 800px;
            padding: 20px;
        }

        .friday-logo {
            width: 100px;
            height: 100px;
            border: 4px solid #00f0ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            font-weight: 900;
            text-shadow: 0 0 15px #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            animation: pulse 2s infinite alternate;
        }

        .welcome-text h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f0ff;
        }

        .welcome-text p {
            font-size: 18px;
            margin: 0;
            color: rgba(0, 240, 255, 0.8);
            letter-spacing: 1px;
            line-height: 1.4;
        }

        /*=========================================
          INTERFACE JARVIS (EN BAS À GAUCHE)
          =========================================*/
        .jarvis-interface {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            z-index: 10;
        }

        /* Orbe JARVIS (Bouton d'activation) */
        .jarvis-orb-container {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .jarvis-orb {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(0,240,255,0.8) 0%, rgba(0,95,115,0.8) 70%, transparent 100%);
            border: 2px solid #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #fff;
            transition: all 0.3s ease;
        }

        .jarvis-orb-container:hover .jarvis-orb {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(0, 240, 255, 0.9);
            text-shadow: 0 0 10px #fff;
        }

        .jarvis-ring-1, .jarvis-ring-2 {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed rgba(0, 240, 255, 0.6);
            pointer-events: none;
        }

        .jarvis-ring-1 {
            width: 120px;
            height: 120px;
            animation: spin 10s linear infinite;
        }

        .jarvis-ring-2 {
            width: 136px;
            height: 136px;
            border-style: double;
            border-width: 2px;
            border-color: rgba(0, 240, 255, 0.3) transparent;
            animation: spin-reverse 6s linear infinite;
        }

        .jarvis-orb.active {
            animation: active-pulse 0.5s infinite alternate !important;
            border-color: #ff007f;
            background: radial-gradient(circle, rgba(255,0,127,0.8) 0%, rgba(120,0,60,0.8) 70%, transparent 100%);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.8);
            color: #fff;
            text-shadow: 0 0 8px #ff007f;
        }

        /* Panneau de données Stark */
        .jarvis-data {
            display: none;
            flex-direction: column;
            gap: 15px;
            background: rgba(10, 14, 23, 0.9);
            border: 1px solid #00f0ff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(5px);
            width: 220px;
            animation: slideUp 0.3s ease-out;
        }

        .data-block {
            font-size: 11px;
            text-transform: uppercase;
        }

        .data-block h4 {
            margin: 0 0 4px 0;
            color: #00f0ff;
            letter-spacing: 1px;
            font-size: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding-bottom: 2px;
        }

        .data-block p {
            margin: 2px 0;
            color: rgba(0, 240, 255, 0.7);
        }

        /*=========================================
          CONSOLE DE CHAT JARVIS (EN BAS À DROITE)
          =========================================*/
        #ai-widget-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #00f0ff 0%, #005f73 70%, #0a0e17 100%);
            border: 2px solid #00f0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        #ai-widget-btn::before {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 1px dashed #00f0ff;
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }

        #ai-widget-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.9);
        }

        #chat-container {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 380px;
            height: 500px;
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid #00f0ff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease-in-out;
        }

        .chat-header {
            background: rgba(0, 240, 255, 0.1);
            padding: 15px;
            border-bottom: 1px solid #00f0ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00f0ff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #39ff14;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #39ff14;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 13px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
        }

        .message.bot {
            background: rgba(0, 240, 255, 0.05);
            border-left: 3px solid #00f0ff;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .message.user {
            background: rgba(255, 0, 127, 0.1);
            border-right: 3px solid #ff007f;
            color: #ff007f;
            align-self: flex-end;
            border-top-right-radius: 0;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);
        }

        .chat-input-area {
            border-top: 1px solid #00f0ff;
            padding: 10px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            padding: 10px;
            color: #00f0ff;
            font-family: inherit;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .chat-input-area button {
            background: #00f0ff;
            color: #0a0e17;
            border: none;
            padding: 0 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .chat-input-area button:hover {
            background: #fff;
            box-shadow: 0 0 12px #00f0ff;
        }

        /* ANIMATIONS GLOBAUX */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 30px rgba(0, 240, 255, 0.8); }
        }
        @keyframes active-pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); }
            100% { transform: scale(1.08); box-shadow: 0 0 45px rgba(255, 0, 127, 1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00f0ff; }
    </style>
</head>
<body>

    <div class="welcome-container">
        <div class="friday-logo">F</div>
        <div class="welcome-text">
            <h1>WELCOME TO CHASSBLAN HUB //</h1>
            <p>F.R.I.D.A.Y. STANDING BY.<br>JARVIS MODULES DEPLOYED.</p>
        </div>
    </div>
