<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chassblan | Official</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <audio id="bg-music" loop preload="auto">
            <source src="musique.mp3" type="audio/mpeg">
        </audio>

        <button id="music-btn" class="music-btn">
            <span class="icon">▶</span> <span class="btn-text">PLAY PHONK</span>
        </button>

        <div class="countdown-section">
            <h2 class="section-title">NEXT DROP IN</h2>
            <div id="countdown" class="timer">24d 00h 00m 00s</div>
        </div>

        <div class="links-section">
            <a href="https://instagram.com/chassblan.emr" target="_blank" class="link-card insta">
                INSTAGRAM
            </a>
            <a href="https://discord.gg/EVJF2rrGhU" target="_blank" class="link-card discord">
                DISCORD
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
